<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Eternal Gate (Kakao)</title>
  <style>
    html,body{height:100%;margin:0;background:#05070c;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .w{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .c{max-width:520px;width:100%;border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:18px 16px;background:rgba(255,255,255,.06)}
    .btn{display:inline-flex;align-items:center;justify-content:center;margin-top:14px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.35);color:#fff;text-decoration:none}
    .sub{opacity:.75;font-size:13px;line-height:1.4}
    code{background:rgba(0,0,0,.35);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="w">
    <div class="c">
      <h2 style="margin:0 0 8px">게임 여는 중…</h2>
      <div class="sub">카카오 인앱 캐시 때문에 이전 파일이 보일 수 있어요.<br/>시간 스탬프를 붙여 최신 파일로 이동합니다.</div>
      <a class="btn" id="go" href="./index.html">게임 열기</a>
      <div class="sub" style="margin-top:10px">문제 지속 시 주소 끝 <code>?t=123</code> 숫자를 바꿔 접속하세요.</div>
    </div>
  </div>
  <script>
    (function(){
      var url = "./index.html?t=" + Date.now();
      var a = document.getElementById("go");
      if(a) a.href = url;
      location.replace(url);
    })();
  </script>
</body>
</html>
